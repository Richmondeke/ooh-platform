<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Approval | Horizon Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#003461",
                        "primary-container": "#004b87",
                        secondary: "#006b5f",
                        "secondary-container": "#8df5e4",
                        "on-secondary-container": "#007165",
                        surface: "#f7f9fb",
                        "on-surface": "#191c1e",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#424750",
                        "outline-variant": "#c2c6d1",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                    },
                    fontFamily: {
                        headline: ["Manrope"],
                        body: ["Inter"],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-surface font-body text-on-surface">
    <!-- TopNavBar -->
    <header
        class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md flex justify-between items-center h-16 px-8 border-b border-outline-variant/10">
        <div class="flex items-center gap-8">
            <span class="text-xl font-black text-primary font-headline tracking-tight">Horizon Analytics</span>
            <nav class="hidden md:flex gap-6 items-center">
                <a href="#"
                    class="font-headline font-semibold text-on-surface-variant hover:text-primary transition-all">Dashboard</a>
                <a href="#"
                    class="font-headline font-semibold text-primary border-b-2 border-primary pb-1">Campaigns</a>
                <a href="#"
                    class="font-headline font-semibold text-on-surface-variant hover:text-primary transition-all">Inventory</a>
                <a href="#"
                    class="font-headline font-semibold text-on-surface-variant hover:text-primary transition-all">Reports</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-on-surface-variant cursor-pointer">notifications</span>
            <span class="material-symbols-outlined text-on-surface-variant cursor-pointer">settings</span>
            <div class="w-8 h-8 rounded-full bg-surface-container overflow-hidden">
                <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=facearea&facepad=2&w=100&h=100&q=80"
                    alt="Profile" class="w-full h-full object-cover">
            </div>
        </div>
    </header>

    <div class="flex pt-16">
        <!-- SideNavBar -->
        <aside
            class="h-[calc(100vh-64px)] w-64 fixed left-0 top-16 bg-white flex flex-col py-6 px-4 space-y-2 border-r border-outline-variant/10">
            <div class="px-4 mb-6">
                <h2 class="text-lg font-bold text-primary font-headline">Navigation</h2>
                <p class="text-xs text-on-surface-variant font-medium opacity-60 uppercase tracking-widest">Page
                    Selection</p>
            </div>
            <nav class="flex-1 space-y-1">
                <a href="deployment-status.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-sm text-on-surface-variant hover:bg-surface-container-low">
                    <span class="material-symbols-outlined">analytics</span>
                    <span>Deployment Status</span>
                </a>
                <a href="campaign-builder.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-sm text-on-surface-variant hover:bg-surface-container-low">
                    <span class="material-symbols-outlined">track_changes</span>
                    <span>Campaign Builder</span>
                </a>
                <a href="asset-configuration.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-sm text-on-surface-variant hover:bg-surface-container-low">
                    <span class="material-symbols-outlined">image</span>
                    <span>Asset Config</span>
                </a>
                <a href="campaign-approval.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-sm bg-primary text-white shadow-premium">
                    <span class="material-symbols-outlined">fact_check</span>
                    <span>Campaign Approval</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="ml-64 w-full p-8 min-h-screen bg-surface-container-low">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-4xl font-extrabold text-on-surface font-headline tracking-tight mb-2">Campaign
                        Approval</h1>
                    <p class="text-on-surface-variant font-medium">Reviewing: <span class="text-primary">Q4 Urban
                            Expansion</span></p>
                </div>
                <div class="flex gap-3">
                    <button
                        class="px-6 py-2.5 rounded-xl text-error font-bold border-2 border-transparent hover:bg-error-container/20 transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined">close</span>
                        Reject
                    </button>
                    <button
                        class="px-8 py-2.5 rounded-xl bg-gradient-to-br from-primary to-primary-container text-white font-bold shadow-lg hover:shadow-primary/20 transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined">check_circle</span>
                        Approve Campaign
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-6">
                <div class="col-span-12 lg:col-span-8 grid grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-xl border-outline-variant/15 flex flex-col justify-between">
                        <span class="text-on-surface-variant text-xs font-bold uppercase tracking-widest mb-4">Total
                            Billboards</span>
                        <div>
                            <span class="text-5xl font-extrabold text-primary font-headline">142</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
