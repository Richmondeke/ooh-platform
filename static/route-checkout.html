<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Horizon Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#003461",
                        "primary-container": "#004b87",
                        secondary: "#006b5f",
                        "secondary-container": "#8df5e4",
                        "on-secondary-container": "#007165",
                        surface: "#f7f9fb",
                        "on-surface": "#191c1e",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#424750",
                        "outline-variant": "#c2c6d1",
                    },
                    fontFamily: {
                        headline: ["Manrope"],
                        body: ["Inter"],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-surface font-body text-on-surface min-h-screen pb-20">
    <!-- TopNavBar -->
    <header
        class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md flex justify-between items-center h-16 px-8 border-b border-outline-variant/10">
        <div class="flex items-center gap-4">
            <span class="text-xl font-extrabold text-primary tracking-tighter">Horizon Analytics</span>
            <div class="h-6 w-[1px] bg-outline-variant/30 hidden md:block"></div>
            <span
                class="text-on-surface-variant font-medium text-sm hidden md:block uppercase tracking-widest text-[10px]">Secure
                Checkout Flow</span>
        </div>
        <div class="flex items-center gap-6">
            <div
                class="flex items-center gap-2 text-on-surface-variant text-[10px] font-bold uppercase tracking-widest">
                <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">lock</span>
                256-bit Encryption
            </div>
            <a href="deployment-status.html" class="text-on-surface-variant hover:text-primary transition-colors">
                <span class="material-symbols-outlined">close</span>
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-8 py-24">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <!-- Left Column: Checkout Forms -->
            <div class="lg:col-span-8 space-y-6">
                <div class="mb-8">
                    <h1 class="text-4xl font-extrabold tracking-tight text-primary mb-4">Secure Checkout</h1>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2 text-secondary font-bold">
                            <span
                                class="w-6 h-6 rounded-full bg-secondary text-white flex items-center justify-center text-xs">1</span>
                            <span>Review</span>
                        </div>
                        <div class="h-[1px] w-8 bg-secondary"></div>
                        <div class="flex items-center gap-2 text-primary font-bold">
                            <span
                                class="w-6 h-6 rounded-full bg-primary text-white flex items-center justify-center text-xs">2</span>
                            <span>Payment</span>
                        </div>
                        <div class="h-[1px] w-8 bg-outline-variant"></div>
                        <div class="flex items-center gap-2 text-on-surface-variant font-bold opacity-40">
                            <span
                                class="w-6 h-6 rounded-full bg-surface-container-high flex items-center justify-center text-xs">3</span>
                            <span>Confirm</span>
                        </div>
                    </div>
                </div>

                <section class="bg-white rounded-3xl p-8 shadow-sm">
                    <div class="flex items-center gap-3 mb-8 text-primary">
                        <span class="material-symbols-outlined">contact_mail</span>
                        <h2 class="text-2xl font-bold tracking-tight">Billing Information</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-2">
                            <label
                                class="text-[10px] font-black text-on-surface-variant uppercase tracking-widest opacity-60">Full
                                Name</label>
                            <input
                                class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary/20 transition-all font-bold text-sm"
                                placeholder="Johnathan Doe" type="text">
                        </div>
                        <div class="space-y-2">
                            <label
                                class="text-[10px] font-black text-on-surface-variant uppercase tracking-widest opacity-60">Email
                                Address</label>
                            <input
                                class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary/20 transition-all font-bold text-sm"
                                placeholder="j.doe@company.com" type="email">
                        </div>
                    </div>
                </section>
            </div>

            <!-- Right Column -->
            <aside class="lg:col-span-4 sticky top-24">
                <div class="bg-primary text-white rounded-[2rem] overflow-hidden shadow-2xl">
                    <div class="p-8">
                        <h3 class="text-xl font-bold tracking-tight mb-6">Order Summary</h3>
                        <div class="space-y-6">
                            <div class="bg-white/10 rounded-2xl p-5 border border-white/10">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-[10px] font-black uppercase tracking-widest opacity-60">Route
                                        Selection</span>
                                    <span class="text-xs font-bold text-secondary-container">12 Assets</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="material-symbols-outlined text-secondary-container">route</span>
                                    <span class="text-lg font-bold">Pacific Highway Corridor</span>
                                </div>
                            </div>
                            <div class="space-y-3 pt-4 border-t border-white/10">
                                <div class="flex justify-between text-sm">
                                    <span class="opacity-60">Subtotal</span>
                                    <span class="font-bold">$12,450.00</span>
                                </div>
                                <div class="flex justify-between items-baseline pt-4 border-t border-white/10">
                                    <span class="font-bold">Total Cost</span>
                                    <span class="text-4xl font-black">$12,699.00</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="p-8 bg-surface-container-highest/10 border-t border-white/10">
                        <button
                            class="w-full bg-secondary text-white py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-3 shadow-xl hover:scale-[1.02] transition-all">
                            Complete Purchase
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </button>
                    </div>
                </div>
            </aside>
        </div>
    </main>
</body>

</html>
